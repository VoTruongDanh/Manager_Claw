      <!-- Hardware Info view -->
      <div id="view-hardware" style="display:none">
        <header class="header">
          <div>
            <h1>Thông số phần cứng</h1>
            <p class="subtitle">Xem chi tiết CPU, RAM, Disk, GPU và các thông số hệ thống</p>
          </div>
          <div class="header-right">
            <label class="toggle-row" style="margin: 0; gap: 8px;">
              <span style="font-size: 13px; color: var(--text-2);">Tự động làm mới</span>
              <div class="switch">
                <input type="checkbox" id="hw-auto-refresh">
                <span class="switch-track"><span class="switch-thumb"></span></span>
              </div>
            </label>
            <button class="btn btn-secondary" id="hw-refresh-btn">
              <svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0111.601 2.566 1 1 0 11-1.885.666A5.002 5.002 0 005.999 7H9a1 1 0 010 2H4a1 1 0 01-1-1V3a1 1 0 011-1zm.008 9.057a1 1 0 011.276.61A5.002 5.002 0 0014.001 13H11a1 1 0 110-2h5a1 1 0 011 1v5a1 1 0 11-2 0v-2.101a7.002 7.002 0 01-11.601-2.566 1 1 0 01.61-1.276z" clip-rule="evenodd"/></svg>
              Làm mới
            </button>
          </div>
        </header>

        <div class="hw-timestamp" id="hw-last-update">Chưa tải dữ liệu</div>

        <div class="hw-sections">
          <!-- System Info -->
          <div class="hw-section">
            <div class="hw-section-header">
              <div class="hw-section-title">
                <svg width="18" height="18" viewBox="0 0 20 20" fill="currentColor">
                  <path fill-rule="evenodd" d="M3 5a2 2 0 012-2h10a2 2 0 012 2v8a2 2 0 01-2 2h-2.22l.123.489.804.804A1 1 0 0113 18H7a1 1 0 01-.707-1.707l.804-.804L7.22 15H5a2 2 0 01-2-2V5zm5.771 7H5V5h10v7H8.771z" clip-rule="evenodd"/>
                </svg>
                System Information
              </div>
              <button class="btn-icon hw-copy-btn" data-section="system" title="Copy JSON">
                <svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor"><path d="M8 3a1 1 0 011-1h2a1 1 0 110 2H9a1 1 0 01-1-1z"/><path d="M6 3a2 2 0 00-2 2v11a2 2 0 002 2h8a2 2 0 002-2V5a2 2 0 00-2-2 3 3 0 01-3 3H9a3 3 0 01-3-3z"/></svg>
              </button>
            </div>
            <div class="hw-section-content" id="hw-system-content">
              <div class="hw-empty">Đang tải...</div>
            </div>
          </div>

          <!-- CPU Info -->
          <div class="hw-section">
            <div class="hw-section-header">
              <div class="hw-section-title">

                </svg>
                CPU

              <button class="btn-icon hw-copy-btn" data-section="cpu" title="Copy JSON">

              <div class="hw-empty">Đang tải...</div>
            </div>
          </div>

            </div>
            <div class="hw-section-content" id="hw-memory-content">
              <div class="hw-empty">Đang tải...</div>
            </div>
          </div>

          <!-- Disk Info -->
          <div class="hw-section">
            <div class="hw-section-header">
              <div class="hw-section-title">
                <svg width="18" height="18" viewBox="0 0 20 20" fill="currentColor">
                  <path fill-rule="evenodd" d="M3 5a2 2 0 012-2h10a2 2 0 012 2v8a2 2 0 01-2 2h-2.22l.123.489.804.804A1 1 0 0113 18H7a1 1 0 01-.707-1.707l.804-.804L7.22 15H5a2 2 0 01-2-2V5zm5.771 7H5V5h10v7H8.771z" clip-rule="evenodd"/>

              <button class="btn-icon hw-copy-btn" data-section="network" title="Copy JSON">

          <div class="hw-section">
            <div class="hw-section-header">
              <div class="hw-section-title">
                <svg width="18" height="18" viewBox="0 0 20 20" fill="currentColor">
                  <path d="M11 3a1 1 0 10-2 0v1a1 1 0 102 0V3zM15.657 5.757a1 1 0 00-1.414-1.414l-.707.707a1 1 0 001.414 1.414l.707-.707zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zM5.05 6.464A1 1 0 106.464 5.05l-.707-.707a1 1 0 00-1.414 1.414l.707.707zM5 10a1 1 0 01-1 1H3a1 1 0 110-2h1a1 1 0 011 1zM8 16v-1h4v1a2 2 0 11-4 0zM12 14c.015-.34.208-.646.477-.859a4 4 0 10-4.954 0c.27.213.462.519.476.859h4.002z"/>
