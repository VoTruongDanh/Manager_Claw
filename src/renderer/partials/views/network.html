      <!-- Network Manager view -->
      <div id="view-network" style="display:none">
        <header class="header">
          <div>
            <h1>Quản lý mạng</h1>
            <p class="subtitle">Bật/tắt adapter, reset, flush DNS và renew IP nhanh</p>
          </div>
          <div class="header-right">
            <span class="badge badge-secondary" id="network-count">0 adapters</span>
            <button class="btn btn-secondary" id="network-flush-dns-btn">
              <svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0111.601 2.566 1 1 0 11-1.885.666A5.002 5.002 0 005.999 7H9a1 1 0 010 2H4a1 1 0 01-1-1V3a1 1 0 011-1zm.008 9.057a1 1 0 011.276.61A5.002 5.002 0 0014.001 13H11a1 1 0 110-2h5a1 1 0 011 1v5a1 1 0 11-2 0v-2.101a7.002 7.002 0 01-11.601-2.566 1 1 0 01.61-1.276z" clip-rule="evenodd"/></svg>
              Flush DNS
            </button>
            <button class="btn btn-secondary" id="network-refresh-btn">
              <svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0111.601 2.566 1 1 0 11-1.885.666A5.002 5.002 0 005.999 7H9a1 1 0 010 2H4a1 1 0 01-1-1V3a1 1 0 011-1zm.008 9.057a1 1 0 011.276.61A5.002 5.002 0 0014.001 13H11a1 1 0 110-2h5a1 1 0 011 1v5a1 1 0 11-2 0v-2.101a7.002 7.002 0 01-11.601-2.566 1 1 0 01.61-1.276z" clip-rule="evenodd"/></svg>
              Làm mới
            </button>
          </div>
        </header>

        <div class="alert alert-warning" style="margin: 0 0 16px 0;">
          <svg width="18" height="18" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>
          <div class="alert-body">
            <div class="alert-title">Yêu cầu quyền Administrator</div>
            <div class="alert-desc">Một số thao tác (Bật/Tắt/Reset adapter) cần chạy app với quyền Administrator. Nếu gặp lỗi "Access denied", hãy khởi động lại app bằng "Run as Administrator".</div>
          </div>
        </div>

        <div class="network-adapters-grid" id="network-list"></div>
      </div>
