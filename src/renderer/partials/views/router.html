      <!-- 9Router view -->
      <div id="view-router">
        <header class="header">
          <div>
            <h1>9Router</h1>
            <p class="subtitle">AI routing service · :20128</p>
          </div>
        </header>

        <div class="service-card" id="router-card">
          <div class="service-header">
            <div class="service-title">
              <div class="service-icon-wrapper">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/>
                </svg>
              </div>
              <div>
                <h3>9Router</h3>
                <p class="service-desc">AI routing service · :20128</p>
              </div>
            </div>
            <span class="badge badge-secondary" id="router-status">
              <span class="status-dot stopped"></span>
              <span class="status-text">Đã dừng</span>
            </span>
          </div>
          <div class="progress progress-indeterminate" id="router-progress" style="display:none"><div class="progress-bar"></div></div>

          <div class="service-metrics">
            <div class="metric copyable" id="router-uptime-metric" title="Click để copy">
              <span class="metric-label">Uptime</span>
              <span class="metric-value" id="router-uptime">--</span>
            </div>
            <div class="metric copyable" id="router-pid-metric" title="Click để copy PID">
              <span class="metric-label">PID</span>
              <span class="metric-value" id="router-pid">--</span>
            </div>
            <div class="metric">
              <span class="metric-label">Nguồn</span>
              <span class="metric-value" id="router-source">--</span>
            </div>
          </div>

          <div class="service-actions">
            <button class="btn btn-sm btn-success" id="start-router" title="Ctrl+1" data-tooltip="Start (Ctrl+1)">
              <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M4 3l8 5-8 5V3z"/></svg>
              Start
            </button>
            <button class="btn btn-sm btn-danger" id="stop-router" title="Ctrl+Shift+1" data-tooltip="Stop (Ctrl+Shift+1)">
              <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><rect x="4" y="4" width="8" height="8"/></svg>
              Stop
            </button>
            <button class="btn btn-sm btn-secondary" id="restart-router" title="Restart service" data-tooltip="Restart service">
              <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path fill-rule="evenodd" d="M8 3a5 5 0 104.546 2.914.5.5 0 00-.908-.417A4 4 0 118 4a.5.5 0 000-1z"/><path d="M8 4.466V.534a.25.25 0 01.41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 018 4.466z"/></svg>
              Restart
            </button>
            <button class="btn btn-sm btn-secondary" id="open-router-folder" title="Mở thư mục cài đặt" data-tooltip="Mở thư mục cài đặt">
              <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M1.5 2A1.5 1.5 0 000 3.5v9A1.5 1.5 0 001.5 14h13a1.5 1.5 0 001.5-1.5v-7A1.5 1.5 0 0014.5 4H7.621a1.5 1.5 0 01-1.06-.44L5.44 2.44A1.5 1.5 0 004.38 2H1.5z"/></svg>
              Folder
            </button>
            <button class="btn btn-sm btn-secondary" id="update-router" title="npm install -g 9router" data-tooltip="npm install -g 9router">
              <svg width="12" height="12" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
              Update
            </button>
            <button class="btn btn-sm btn-secondary" id="open-router-dashboard" title="Mở http://localhost:20128" data-tooltip="Mở http://localhost:20128">
              <svg width="12" height="12" viewBox="0 0 20 20" fill="currentColor"><path d="M11 3a1 1 0 100 2h2.586l-6.293 6.293a1 1 0 101.414 1.414L15 6.414V9a1 1 0 102 0V4a1 1 0 00-1-1h-5z"/><path d="M5 5a2 2 0 00-2 2v8a2 2 0 002 2h8a2 2 0 002-2v-3a1 1 0 10-2 0v3H5V7h3a1 1 0 000-2H5z"/></svg>
              Web UI
            </button>
          </div>

          <div class="log-section">
            <div class="log-header" id="router-log-header" style="cursor:pointer">
              <button class="btn-icon log-chevron" id="router-log-chevron" title="Thu gọn/Mở rộng log" aria-label="Toggle log">
                <svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor" style="transition:transform 250ms"><path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
              </button>
              <span class="log-title">Console Output</span>
              <span class="log-unread" id="router-log-unread" style="display:none"></span>
              <div class="log-filters">
                <button class="log-filter active" data-filter="all" data-log="router-log">All</button>
                <button class="log-filter" data-filter="error" data-log="router-log">Error</button>
                <button class="log-filter" data-filter="success" data-log="router-log">OK</button>
              </div>
              <button class="btn-icon" id="clear-router-log" title="Xóa log">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M5.5 5.5A.5.5 0 016 6v6a.5.5 0 01-1 0V6a.5.5 0 01.5-.5zm2.5 0a.5.5 0 01.5.5v6a.5.5 0 01-1 0V6a.5.5 0 01.5-.5zm3 .5a.5.5 0 00-1 0v6a.5.5 0 001 0V6z"/><path fill-rule="evenodd" d="M14.5 3a1 1 0 01-1 1H13v9a2 2 0 01-2 2H5a2 2 0 01-2-2V4h-.5a1 1 0 01-1-1V2a1 1 0 011-1H6a1 1 0 011-1h2a1 1 0 011 1h3.5a1 1 0 011 1v1zM4.118 4L4 4.059V13a1 1 0 001 1h6a1 1 0 001-1V4.059L11.882 4H4.118zM2.5 3V2h11v1h-11z"/></svg>
              </button>
            </div>
            <div class="log-content" id="router-log">
              <div class="log-empty">Chưa có log</div>
            </div>
          </div>
        </div>
      </div>
