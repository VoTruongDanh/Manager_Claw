<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Service Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="app-loading">
  <div id="app-loading-screen" class="app-loading-screen" aria-live="polite" role="status">
    <div class="app-loading-box">
      <div class="app-loading-logo">
        <svg width="36" height="36" viewBox="0 0 28 28" fill="none" aria-hidden="true">
          <rect width="28" height="28" rx="6" fill="#000"/>
          <path d="M14 7L21 14L14 21L7 14L14 7Z" fill="white"/>
        </svg>
      </div>
      <h2>Service Manager</h2>
      <p>Đang khởi tạo hệ thống...</p>
      <div class="app-loading-bar" aria-hidden="true"><span></span></div>
    </div>
  </div>

  <div class="app">
    <div data-include="src/renderer/partials/sidebar.html"></div>

    <main class="main-content">
      <div data-include="src/renderer/partials/views/dashboard.html"></div>
      <div data-include="src/renderer/partials/views/router.html"></div>
      <div data-include="src/renderer/partials/views/openclaw.html"></div>
      <div data-include="src/renderer/partials/views/logs.html"></div>
      <div data-include="src/renderer/partials/views/settings.html"></div>
      <div data-include="src/renderer/partials/views/shutdown.html"></div>
      <div data-include="src/renderer/partials/views/reset.html"></div>
      <div data-include="src/renderer/partials/views/network.html"></div>
      <div data-include="src/renderer/partials/views/hardware.html"></div>
      <div data-include="src/renderer/partials/modals/network-ip.html"></div>
      <div data-include="src/renderer/partials/views/prompts.html"></div>
      <div data-include="src/renderer/partials/views/links.html"></div>
    </main>
  </div>

  <div data-include="src/renderer/partials/command-palette.html"></div>

  <script>
    const path = require('path');
    const { mountHtmlPartials } = require(path.join(__dirname, 'src/renderer/bootstrap/htmlPartials.js'));

    mountHtmlPartials({ document, rootDir: __dirname });
    require(path.join(__dirname, 'src/renderer/index.js'));
  </script>
</body>
</html>
